# Viviani residual policy under PINK observation noise.
#
# Identical to viviani_residual except:
#   wrappers.noise_color: pink   (Voss-McCartney 1/f, 6 octaves)
#
# Pink noise has equal power per octave so a fixed-window low-pass filter (or
# the policy's lookahead-average equivalent) can't reject it. Tests whether
# the residual decomposition + 4M steps is enough to learn broadband rejection,
# or whether the policy degrades materially under harder noise than the IID
# Gaussian it was trained on. Separate `name` so the white-noise checkpoints
# and videos remain untouched.

name: viviani_residual_pink

env:
  control_hz: 50
  max_steps: 500
  max_delta_rad: 0.0873
  reset_noise_rad: 0.02
  start_at_target: true
  tip_offset_m: 0.1034
  include_cartesian_velocities: true
  lookahead_n: 8
  lookahead_dt_s: 0.15
  home_qpos: [0.257813, 0.163813, -0.335467, -1.865636, 0.389176, 1.429329, -0.965127]

trajectory:
  kind: viviani
  period_s: 4.0
  center_xyz: [0.5, 0.0, 0.4]
  sphere_radius_m: 0.12

wrappers:
  obs_noise_sigma_m: 0.02
  action_delay_steps: 2
  noise_color: pink
  noise_octaves: 6

reward:
  w_track: 10.0
  w_action_rate: 0.1
  w_qdot: 0.001
  w_inband: 0.5

residual_ff:
  enabled: true
  p_gain: 0.5
  damping: 0.01
  clip: 0.8

ppo:
  total_timesteps: 4_000_000
  n_envs: 16
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  net_arch: [256, 256]
