# Viviani — residual RL on a Jacobian-pseudoinverse feedforward.
#
# Headline change vs viviani_v2: the policy now outputs a *residual* on top of
# an analytic feedforward action, instead of the full joint command.
#
#   a_total = clip( a_residual(obs)  +  a_feedforward(q, target, target_vel),  ±1 )
#
# The feedforward is damped-least-squares inverse kinematics:
#   J(q) = ∂ee_pos / ∂q                    (3 × 7, from mj_jacBody)
#   Δee  = target_vel · Δt + p · (target − ee)
#   Δq   = J⁺_λ · Δee  ,  J⁺_λ = J^T (J J^T + λI)⁻¹
#   a_ff = Δq / max_delta_rad   (clipped to ±clip to leave residual headroom)
#
# The policy is given a_ff in its observation so it knows what it is
# correcting. With a sane feedforward, a_residual starts near zero and only
# has to learn compensation for: control delay, observation noise, and the
# fast direction reversal at the curve's self-crossing.
#
# Expected: lower steady RMS than viviani_v2 (8 mm) on the same Viviani curve,
# AND the same trained policy should track the circle zero-shot because
# the feedforward absorbs the trajectory-specific kinematics.

name: viviani_residual

env:
  control_hz: 50
  max_steps: 500
  max_delta_rad: 0.0873
  reset_noise_rad: 0.02
  start_at_target: true
  tip_offset_m: 0.1034
  include_cartesian_velocities: true
  lookahead_n: 8
  lookahead_dt_s: 0.15
  home_qpos: [0.257813, 0.163813, -0.335467, -1.865636, 0.389176, 1.429329, -0.965127]

trajectory:
  kind: viviani
  period_s: 4.0
  center_xyz: [0.5, 0.0, 0.4]
  sphere_radius_m: 0.12

wrappers:
  obs_noise_sigma_m: 0.02
  action_delay_steps: 2

reward:
  w_track: 10.0
  w_action_rate: 0.1
  w_qdot: 0.001
  w_inband: 0.5

residual_ff:
  enabled: true
  p_gain: 0.5       # proportional-position correction on top of velocity FF
  damping: 0.01     # Tikhonov λ inside J⁺ — keeps singular configs sane
  clip: 0.8         # ±0.8 cap on a_ff so the residual has ±0.2 of headroom

ppo:
  total_timesteps: 4_000_000
  n_envs: 16
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  net_arch: [256, 256]
