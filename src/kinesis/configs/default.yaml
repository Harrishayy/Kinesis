# Default training configuration for Kinesis.
# Fields will be populated as milestones land (env, training, evaluation).

env:
  control_hz: 50
  max_steps: 500

trajectory:
  kind: circle
  period_s: 4.0
  radius_m: 0.15

reward:
  w_track: 10.0
  w_action_rate: 0.1
  w_qdot: 0.001
  w_inband: 0.5

ppo:
  total_timesteps: 2_000_000
  n_envs: 16
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
