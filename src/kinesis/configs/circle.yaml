# Circle-tracking configuration: 15 cm circle in the y-z plane at fixed
# x = 0.5 m, period 4 s (0.25 Hz).

env:
  control_hz: 50
  max_steps: 500
  max_delta_rad: 0.0873  # ~5 degrees per control step
  reset_noise_rad: 0.02
  lookahead_n: 4
  lookahead_dt_s: 0.1
  # Solved by scripts/find_home_pose.py — places the hand at
  # (0.531, 0.010, 0.407), 3.3 cm from the trajectory center.
  # An "on-trajectory" pose was tried earlier but placed joint 4 too close to
  # its limit (-1.47 vs limit -0.07), which collapsed manipulability and caused
  # late-episode drift. The centered pose has more headroom in joint space; the
  # startup transient from home → first target is handled in the eval metric
  # by reporting steady-state RMS separately.
  home_qpos: [0.257813, 0.163813, -0.335467, -1.865636, 0.389176, 1.429329, -0.965127]

trajectory:
  kind: circle
  period_s: 4.0
  radius_m: 0.15
  center_xyz: [0.5, 0.0, 0.4]

wrappers:
  obs_noise_sigma_m: 0.02
  action_delay_steps: 2

reward:
  w_track: 10.0
  w_action_rate: 0.1
  w_qdot: 0.001
  w_inband: 0.5

ppo:
  total_timesteps: 2_000_000
  n_envs: 16
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
