# Viviani — longer training (4M steps).
#
# Ablation #1: does the baseline plateau or just need more gradient steps?
# Identical to viviani.yaml except `name` (so artifacts don't clobber the
# baseline) and `ppo.total_timesteps`.

name: viviani_4m

env:
  control_hz: 50
  max_steps: 500
  max_delta_rad: 0.0873
  reset_noise_rad: 0.02
  start_at_target: true
  tip_offset_m: 0.1034
  lookahead_n: 4
  lookahead_dt_s: 0.1
  home_qpos: [0.257813, 0.163813, -0.335467, -1.865636, 0.389176, 1.429329, -0.965127]

trajectory:
  kind: viviani
  period_s: 4.0
  center_xyz: [0.5, 0.0, 0.4]
  sphere_radius_m: 0.12

wrappers:
  obs_noise_sigma_m: 0.02
  action_delay_steps: 2

reward:
  w_track: 10.0
  w_action_rate: 0.1
  w_qdot: 0.001
  w_inband: 0.5
  w_orient: 0.25

ppo:
  total_timesteps: 4_000_000
  n_envs: 16
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
